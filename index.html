<!doctype html>
<html lang="zh-CN" data-accent="ikb">
<head>
  <meta charset="utf-8">
  <title>银行考编 · 倒计时100天</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <style>
    :root,[data-accent="ikb"] {
      --paper: #fafaf8; --ink: #0a0a0a;
      --accent: #002FA7; --accent-on: #ffffff;
    }
    :root {
      --sans: "Inter","Helvetica Neue",Helvetica,"Noto Sans SC",-apple-system,"PingFang SC",sans-serif;
      --sans-zh: "Noto Sans SC",-apple-system,"PingFang SC","Inter",sans-serif;
      --mono: "IBM Plex Mono",ui-monospace,Consolas,monospace;
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a; font-family: var(--sans);
      -webkit-font-smoothing: antialiased; padding: 64px 32px;
    }
    .sheet { display: flex; flex-direction: column; align-items: center; gap: 48px; }

    .poster {
      position: relative; background: #000; color: #fff;
      overflow: hidden; isolation: isolate;
    }
    .poster.wide { width: 2100px; height: 900px; }

    .hero-img {
      position: absolute; inset: 0; z-index: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center 55%;
    }
    .hero-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(160deg,
        rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.65) 28%,
        rgba(0,0,0,0.48) 52%, rgba(0,0,0,0.55) 74%,
        rgba(0,0,0,0.72) 100%);
    }

    /* All content centered, vertical stack */
    .content {
      position: relative; z-index: 2;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 300px;
      text-align: center;
      gap: 32px;
    }

    /* Typography — balanced sizes for 2100x900 */
    .num-row {
      display: flex; flex-direction: row; align-items: baseline; justify-content: center;
      gap: 32px;
    }
    .num-mega {
      font-family: var(--sans); font-weight: 200;
      font-size: 220px;
      line-height: .90; letter-spacing: .02em;
      color: var(--accent);
    }
    .num-label {
      font-family: var(--sans); font-weight: 500; font-size: 36px;
      letter-spacing: .16em; color: var(--accent);
      text-transform: uppercase;
    }
    .h-hero {
      font-family: var(--sans); font-weight: 200; font-size: 156px;
      line-height: 1.06; letter-spacing: .04em;
      color: #ffffff;
    }
    .lead {
      font-family: var(--sans-zh); font-weight: 400; font-size: 36px;
      line-height: 1.45; color: rgba(255,255,255,0.82);
      max-width: 900px;
    }
    .t-meta {
      font-family: var(--mono); font-weight: 500; font-size: 20px;
      letter-spacing: .14em;
      color: rgba(255,255,255,0.40);
    }
    .hr-accent {
      border: none; height: 3px; background: var(--accent);
      width: 200px; margin: 0 auto;
    }
    .kw-row {
      display: flex; flex-direction: row; gap: 28px;
    }
    .kw-pill {
      padding: 12px 44px;
      border: 1.5px solid rgba(255,255,255,0.20);
      font-family: var(--sans-zh); font-weight: 400; font-size: 32px;
      color: rgba(255,255,255,0.78);
      letter-spacing: .06em;
    }
  </style>
</head>
<body>
<main class="sheet">

  <section class="poster wide" id="wechat-cover">
    <img class="hero-img" src="assets/study-desk.jpg" alt="深夜书桌"
         style="object-position:center 55%">
    <div class="hero-overlay"></div>

    <div class="content">
      <!-- Top: countdown -->
      <div class="num-row">
        <span class="num-label">倒&nbsp;计&nbsp;时</span>
        <span class="num-mega">100</span>
        <span class="num-label">天</span>
      </div>

      <!-- Title -->
      <h1 class="h-hero">银行考编</h1>
      <hr class="hr-accent">

      <!-- Motivation -->
      <p class="lead">每一天的坚持，都是在为上岸铺路</p>

      <!-- Keywords -->
      <div class="kw-row">
        <span class="kw-pill">刷题</span>
        <span class="kw-pill">模考</span>
        <span class="kw-pill">复盘</span>
      </div>

      <!-- Meta -->
      <p class="t-meta">2026 银行秋招 &nbsp;·&nbsp; 你一定行</p>
    </div>
  </section>

</main>
</body>
</html>
