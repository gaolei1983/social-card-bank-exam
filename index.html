<!doctype html>
<html lang="zh-CN" data-accent="ikb">
<head>
  <meta charset="utf-8">
  <title>银行考编 · 倒计时100天</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <style>
    :root,[data-accent="ikb"] {
      --paper: #fafaf8; --ink: #0a0a0a;
      --grey-2: #d4d4d2; --grey-3: #737373;
      --accent: #002FA7; --accent-on: #ffffff;
    }
    :root {
      --sans: "Inter","Helvetica Neue",Helvetica,"Noto Sans SC",-apple-system,"PingFang SC",sans-serif;
      --sans-zh: "Noto Sans SC",-apple-system,"PingFang SC","Inter",sans-serif;
      --mono: "IBM Plex Mono",ui-monospace,Consolas,monospace;
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a; font-family: var(--sans);
      -webkit-font-smoothing: antialiased; padding: 64px 32px;
    }
    .sheet { display: flex; flex-direction: column; align-items: center; gap: 48px; }

    .poster {
      position: relative; background: #000; color: #fff;
      overflow: hidden; isolation: isolate;
    }
    .poster.wide { width: 2100px; height: 900px; }

    .hero-img {
      position: absolute; inset: 0; z-index: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center 55%;
    }
    .hero-overlay {
      position: absolute; inset: 0; z-index: 1;
      background:
        linear-gradient(155deg,
          rgba(0,0,0,0.88) 0%,
          rgba(0,0,0,0.68) 25%,
          rgba(0,0,0,0.50) 50%,
          rgba(0,0,0,0.58) 75%,
          rgba(0,0,0,0.74) 100%);
    }

    /* Content: grid 3-column: [100] [divider] [title+desc+keywords] */
    .content {
      position: relative; z-index: 2;
      width: 100%; height: 100%;
      display: grid;
      grid-template-columns: auto auto 1fr;
      align-content: center;
      padding: 80px 200px;
      gap: 0 60px;
    }

    .num-block {
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      gap: 8px;
    }
    .divider {
      width: 3px; background: var(--accent);
      align-self: stretch; margin: 40px 0; border-radius: 2px;
    }
    .text-block {
      display: flex; flex-direction: column; justify-content: center;
      gap: 16px;
    }

    /* Typography */
    .num-mega {
      font-family: var(--sans); font-weight: 200;
      font-size: 300px;
      line-height: .86; letter-spacing: -.03em;
      color: var(--accent);
      padding: 20px 0; margin: -20px 0;
    }
    .num-label {
      font-family: var(--sans); font-weight: 600; font-size: 28px;
      letter-spacing: .16em; text-transform: uppercase; color: var(--accent);
    }
    .h-hero {
      font-family: var(--sans); font-weight: 200; font-size: 168px;
      line-height: 1.04; letter-spacing: -.01em; color: #ffffff;
    }
    .lead {
      font-family: var(--sans-zh); font-weight: 400; font-size: 34px;
      line-height: 1.45; color: rgba(255,255,255,0.85);
    }
    .t-meta {
      font-family: var(--mono); font-weight: 500; font-size: 20px;
      letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
    .hr-accent {
      border: none; height: 3px; background: var(--accent);
      width: 160px; margin: 4px 0;
    }

    /* Right-side keyword pills */
    .kw-row {
      display: flex; flex-direction: row; gap: 24px; margin-top: 16px;
    }
    .kw-pill {
      display: flex; align-items: center; justify-content: center;
      padding: 14px 40px;
      border: 1.5px solid rgba(255,255,255,0.22);
      font-family: var(--sans-zh); font-weight: 400; font-size: 30px;
      color: rgba(255,255,255,0.80);
      letter-spacing: .04em;
    }
  </style>
</head>
<body>
<main class="sheet">

  <section class="poster wide" id="wechat-cover">
    <img class="hero-img" src="assets/study-desk.jpg" alt="深夜书桌"
         style="object-position:center 55%">
    <div class="hero-overlay"></div>

    <div class="content">
      <!-- COL 1: countdown -->
      <div class="num-block">
        <p class="num-label">倒&nbsp;计&nbsp;时</p>
        <p class="num-mega">100</p>
        <p class="num-label">天</p>
      </div>

      <!-- COL 2: divider -->
      <div class="divider"></div>

      <!-- COL 3: everything else -->
      <div class="text-block">
        <h1 class="h-hero">银行考编</h1>
        <hr class="hr-accent">
        <p class="lead">每一天的坚持，都是在为上岸铺路</p>
        <div class="kw-row">
          <span class="kw-pill">刷题</span>
          <span class="kw-pill">模考</span>
          <span class="kw-pill">复盘</span>
        </div>
        <p class="t-meta">2026 银行秋招 &nbsp;·&nbsp; 你一定行</p>
      </div>
    </div>
  </section>

</main>
</body>
</html>
